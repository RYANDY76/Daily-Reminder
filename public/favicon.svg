<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070B1A"/>
      <stop offset="100%" stop-color="#0F1529"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#DCE4F2"/>
      <stop offset="25%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#A0B0CC"/>
      <stop offset="75%" stop-color="#DCE4F2"/>
      <stop offset="100%" stop-color="#7080A0"/>
    </linearGradient>
    <linearGradient id="blue-accent" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#55C8FF"/>
      <stop offset="100%" stop-color="#3A8FD9"/>
    </linearGradient>
    <linearGradient id="purple-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6D3FD6"/>
    </linearGradient>
    <linearGradient id="pink-accent" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EC6BFF"/>
      <stop offset="100%" stop-color="#C845D9"/>
    </linearGradient>
    <linearGradient id="chrome-loop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#DCE4F2"/>
      <stop offset="60%" stop-color="#55C8FF"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Outer fluid A shape -->
  <path d="M50 8 L18 88 L32 88 L38 72 L62 72 L68 88 L82 88 L50 8Z" fill="url(#chrome)" opacity="0.95"/>
  <!-- Inner cutout for A negative space -->
  <path d="M50 32 L38 62 L62 62 L50 32Z" fill="url(#bg)"/>
  <!-- Fluid/parametric diagonal accent left -->
  <path d="M50 8 L18 88 L28 88 L50 24Z" fill="url(#blue-accent)" opacity="0.6"/>
  <!-- Fluid/parametric diagonal accent right -->
  <path d="M50 8 L82 88 L72 88 L50 24Z" fill="url(#pink-accent)" opacity="0.4"/>
  <!-- Loop in the center (infinity/flow symbol) -->
  <path d="M38 72 C34 60 42 50 50 50 C58 50 66 60 62 72 C60 78 54 82 50 82 C46 82 44 78 42 76" 
        fill="none" stroke="url(#chrome-loop)" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Loop inner highlight -->
  <path d="M40 71 C38 63 44 55 50 55 C56 55 62 63 60 71" 
        fill="none" stroke="#FFFFFF" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <!-- Chrome shine highlight on A -->
  <path d="M50 12 L44 28" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Purple glow dot accent -->
  <circle cx="30" cy="80" r="2" fill="#8B5CF6" opacity="0.8" filter="url(#glow)"/>
  <circle cx="70" cy="80" r="1.5" fill="#EC6BFF" opacity="0.6" filter="url(#glow)"/>
</svg>
