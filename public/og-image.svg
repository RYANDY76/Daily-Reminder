<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1A2038"/>
      <stop offset="100%" stop-color="#070B1A"/>
    </radialGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B0C4DE"/>
      <stop offset="20%" stop-color="#E8EEF6"/>
      <stop offset="40%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#C0D0E8"/>
      <stop offset="80%" stop-color="#8898B8"/>
      <stop offset="100%" stop-color="#D0DAE8"/>
    </linearGradient>
    <linearGradient id="chrome-dark" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#405068"/>
      <stop offset="50%" stop-color="#8898B8"/>
      <stop offset="100%" stop-color="#303848"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#55C8FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2080C0" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="pink" x1="1" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#EC6BFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#A030C0" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="chrome-hl" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="12" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/></filter>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse" opacity="0.03">
      <path d="M80 0L0 0 0 80" fill="none" stroke="#55C8FF" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Ambient glow -->
  <ellipse cx="400" cy="315" rx="200" ry="120" fill="#55C8FF" opacity="0.05" filter="url(#glow)"/>
  <ellipse cx="400" cy="315" rx="160" ry="100" fill="#EC6BFF" opacity="0.03" filter="url(#glow)"/>
  <!-- Large Chrome A -->
  <g transform="translate(140, 60) scale(2)" filter="url(#shadow)">
    <path d="M256 60L120 420L180 450L220 340" fill="url(#chrome)"/>
    <path d="M256 60L392 420L332 450L292 340" fill="url(#chrome-dark)"/>
    <path d="M180 340C200 310 230 295 256 295C282 295 312 310 332 340C340 355 335 365 328 370C310 380 282 385 256 385C230 385 202 380 184 370C177 365 172 355 180 340Z" fill="url(#chrome)"/>
    <path d="M256 120L340 340C345 352 340 358 332 362C318 368 290 372 256 372C222 372 194 368 180 362C172 358 167 352 172 340L256 120Z" fill="#070B1A"/>
    <path d="M256 65L130 420L160 420L256 130Z" fill="url(#blue)" opacity="0.5"/>
    <path d="M256 65L382 420L352 420L256 130Z" fill="url(#pink)" opacity="0.5"/>
    <path d="M256 65L240 110" stroke="url(#chrome-hl)" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <path d="M256 65L125 418" stroke="#FFF" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
    <path d="M256 65L387 418" stroke="#A0B0C8" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  </g>
  <!-- Brand text -->
  <text x="820" y="200" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800" fill="#DCE4F2" letter-spacing="4">AVORA</text>
  <text x="820" y="260" font-family="Inter, Arial, sans-serif" font-size="18" fill="#55C8FF" letter-spacing="6" font-weight="300">FUTURISTIK · PREMIUM · CERDAS</text>
  <!-- Tagline bar -->
  <rect x="820" y="320" width="260" height="48" rx="24" fill="url(#blue)" opacity="0.85"/>
  <text x="950" y="350" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">PRODUKTIVITAS TANPA BATAS</text>
  <!-- Chrome accent -->
  <line x1="820" y1="420" x2="1100" y2="420" stroke="url(#chrome)" stroke-width="0.5" opacity="0.3"/>
  <text x="960" y="460" font-family="Inter, Arial, sans-serif" font-size="11" fill="#607090" text-anchor="middle" letter-spacing="3">#AVORAAPP</text>
</svg>
